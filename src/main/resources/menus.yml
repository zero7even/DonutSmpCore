      TITLE: "&aС•бҙҸКҖбҙӣ" # Sets the title text shown for this menu or prompt.
      MATERIAL: HOPPER # Sets the Bukkit material used here.
      SLOT: 46 # Sets the inventory slot used by this item.
      SELECTED-PREFIX: "&a" # Configures the selected prefix option.
      UNSELECTED-PREFIX: "&f" # Configures the unselected prefix option.
