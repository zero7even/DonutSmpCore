# UDS setup: Orders marketplace behavior, item selection, pricing, delivery, and menus.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Main enable flags, limits, timings, and behavior defaults for this feature.
SETTINGS:
  ENABLED: true # Enables or disables settings.
  ORDER_DURATION_HOURS: 168 # Sets how long this behavior lasts.
  MAX_ACTIVE_ORDERS_DEFAULT: 5 # Sets the allowed limit for this option.
  MAX_ACTIVE_ORDERS_BY_PERMISSION:
    ultimatedonutsmp.orders.limit.10: 10 # Configures the ultimatedonutsmp orders limit 10 option.
    ultimatedonutsmp.orders.limit.15: 15 # Configures the ultimatedonutsmp orders limit 15 option.
  MAX_QUANTITY_PER_ORDER: 2304 # Sets the allowed limit for this option.
  # SELECT_ITEM = opens the configured order catalog menu. This is the default.
  # INVENTORY_ITEM = lets players click an item from their inventory as the exact order template.
  # SEARCH_ITEM = asks players to type an item/category search, then opens matching results.
  # Valid values: SELECT_ITEM, INVENTORY_ITEM, SEARCH_ITEM. Invalid values fall back to SELECT_ITEM.
  ITEM_SELECTION_MODE: SELECT_ITEM # Selects the mode or type used by this option.
  # SELECT_ITEM_SOURCE only changes the SELECT_ITEM menu contents.
  # CATEGORY_FILTERS = use the curated CATEGORY_FILTERS list below. This is the default.
  # SERVER_MATERIALS = generate all orderable materials from the running server.jar.
  # Valid values: CATEGORY_FILTERS, SERVER_MATERIALS. Invalid values fall back to CATEGORY_FILTERS.
  SELECT_ITEM_SOURCE: CATEGORY_FILTERS # Configures the select item source option.
  CLICK_COOLDOWN_MS: 750 # Sets the cooldown before this action can run again.
  EXPIRE_CHECK_SECONDS: 30 # Sets the time value in seconds.

# UDS setup: Price floors, caps, fees, escrow limits, and refund behavior.
PRICING:
  MIN_PRICE_EACH: 10 # Sets the allowed limit for this option.
  # Maximum price for one requested item. Default matches MAX_TOTAL_BUDGET so the total escrow cap is the main limit.
  MAX_PRICE_EACH: 250000000 # Sets the allowed limit for this option.
  # Maximum total escrow budget for one order after quantity x price each.
  MAX_TOTAL_BUDGET: 250000000 # Sets the allowed limit for this option.
  ORDER_CREATION_FEE: 0 # Configures the order creation fee option.

# UDS setup: How matched order items are delivered or claimed.
DELIVERY:
  # DEPOSIT_GUI opens a 35-slot deposit inventory. AUTO_SCAN keeps the legacy inventory scan.
  MODE: DEPOSIT_GUI
  MAX_DELIVER_PER_CLICK: 64 # Sets the allowed limit for this option.
  MAX_DELIVER_PER_TRANSACTION: 2304
  LIMIT_TO_STACK_SIZE: false # If true, caps delivery to 1 stack per click. If false, allows bulk delivery.
  CLAIMS_ENABLED: true # If true, players can claim/collect their completed orders and refunds.

# UDS setup: Rules used when comparing submitted items to order templates.
MATCHING:
  BLOCKED_MATERIALS:
    - BEDROCK
    - BARRIER
    - COMMAND_BLOCK
    - CHAIN_COMMAND_BLOCK
    - REPEATING_COMMAND_BLOCK
    - STRUCTURE_BLOCK
    - STRUCTURE_VOID
    - JIGSAW
    - LIGHT

# UDS setup: Curated item categories shown in order selection menus.
CATEGORY_FILTERS:
  ALL: [] # Configures the all option.
  BLOCKS:
    - STONE
    - COBBLESTONE
    - DIRT
    - OAK_LOG
    - GLASS
    - OBSIDIAN
  TOOLS:
    - IRON_PICKAXE
    - DIAMOND_PICKAXE
    - DIAMOND_AXE
    - DIAMOND_SHOVEL
  FOOD:
    - APPLE
    - BREAD
    - COOKED_BEEF
    - COOKED_CHICKEN
    - GOLDEN_CARROT
  COMBAT:
    - ARROW
    - SHIELD
    - DIAMOND_SWORD
    - NETHERITE_SWORD
  POTIONS:
    - GLASS_BOTTLE
    - FERMENTED_SPIDER_EYE
    - BLAZE_POWDER
  BOOKS:
    - BOOK
    - BOOKSHELF
    - LECTERN
  INGREDIENTS:
    - WHEAT
    - SUGAR_CANE
    - BLAZE_ROD
    - ENDER_PEARL
    - SLIME_BALL
  UTILITIES:
    - HOPPER
    - PISTON
    - OBSERVER
    - REDSTONE
    - DISPENSER

# UDS setup: Menu title, rows, slots, buttons, and item layout for this feature.
GUI:
