    SIZE: 54 # Sets the inventory size in slots.
    ITEMS_PER_PAGE: 45 # Sets how many entries appear on each page.
    BUTTONS:
      PREV: { SLOT: 45, MATERIAL: ARROW }
      SORT: { SLOT: 47, MATERIAL: CAULDRON }
      FILTER: { SLOT: 48, MATERIAL: HOPPER }
      REFRESH: { SLOT: 49, MATERIAL: CLOCK }
      SEARCH: { SLOT: 50, MATERIAL: SPYGLASS }
      MY_ORDERS: { SLOT: 51, MATERIAL: CHEST }
      COLLECT: { SLOT: 52, MATERIAL: ENDER_CHEST }
      NEXT: { SLOT: 53, MATERIAL: ARROW }
  MY_ORDERS:
    TITLE: "&8ᴏʀᴅᴇʀѕ -> ᴍʏ ᴏʀᴅᴇʀѕ" # Sets the title text shown for this menu or prompt.
    SIZE: 27 # Sets the inventory size in slots.
    ITEMS_PER_PAGE: 25 # Sets how many entries appear on each page.
    BUTTONS:
      BACK: { SLOT: 25, MATERIAL: COMPASS }
      NEW: { SLOT: 26, MATERIAL: LIME_DYE }
  NEW_ORDER:
    TITLE: "&8ᴏʀᴅᴇʀѕ -> ɴᴇᴡ ᴏʀᴅᴇʀ" # Sets the title text shown for this menu or prompt.
    SIZE: 27 # Sets the inventory size in slots.
  SELECT_ITEM:
    TITLE: "&8ᴏʀᴅᴇʀѕ -> ѕᴇʟᴇᴄᴛ ɪᴛᴇᴍ" # Sets the title text shown for this menu or prompt.
    SIZE: 54 # Sets the inventory size in slots.
    ITEMS_PER_PAGE: 45 # Sets how many entries appear on each page.
  SEARCH_ITEM:
    TITLE: "&8ᴏʀᴅᴇʀѕ -> ѕᴇᴀʀᴄʜ ɪᴛᴇᴍ" # Sets the title text shown for this menu or prompt.
    SIZE: 54 # Sets the inventory size in slots.
    ITEMS_PER_PAGE: 45 # Sets how many entries appear on each page.
  INVENTORY_ITEM:
    TITLE: "&8ᴏʀᴅᴇʀѕ -> ᴄʜᴏᴏѕᴇ ɪᴛᴇᴍ" # Sets the title text shown for this menu or prompt.
    SIZE: 27 # Sets the inventory size in slots.
  EDIT_ORDER:
    TITLE: "&8ᴏʀᴅᴇʀѕ -> ᴇᴅɪᴛ ᴏʀᴅᴇʀ" # Sets the title text shown for this menu or prompt.
    SIZE: 27 # Sets the inventory size in slots.
  DELIVER_CONFIRM:
    TITLE: "&8ᴏʀᴅᴇʀѕ -> ᴅᴇʟɪᴠᴇʀ" # Sets the title text shown for this menu or prompt.
    SIZE: 27 # Sets the inventory size in slots.
  DELIVERY_DEPOSIT:
    SIZE: 36
    BUTTONS:
      CONFIRM: { SLOT: 35, MATERIAL: LIME_STAINED_GLASS_PANE }
  DELIVERY_CONFIRM:
    SIZE: 27
    BUTTONS:
      CANCEL: { SLOT: 11, MATERIAL: RED_STAINED_GLASS_PANE }
      CONFIRM: { SLOT: 15, MATERIAL: LIME_STAINED_GLASS_PANE }
  DELETE:
    SIZE: 27
    BUTTONS:
      BACK: { SLOT: 10, MATERIAL: RED_STAINED_GLASS_PANE }
      CONFIRM: { SLOT: 16, MATERIAL: LIME_STAINED_GLASS_PANE }
  COLLECT:
    TITLE: "&8ᴏʀᴅᴇʀѕ -> ᴄᴏʟʟᴇᴄᴛ" # Sets the title text shown for this menu or prompt.
    SIZE: 54 # Sets the inventory size in slots.
    ITEMS_PER_PAGE: 45 # Sets how many entries appear on each page.
    BUTTONS:
      COLLECT_PAGE: { MATERIAL: HOPPER }
      DROP_PAGE: { MATERIAL: DROPPER }

# UDS setup: Optional Bedrock forms. Java GUIs remain the fallback.
BEDROCK:
  ENABLED: true
  MAX_RESULTS: 20
  FALLBACK_TO_JAVA_GUI: true

# UDS setup: Cross-server refresh and tokenized order locks.
NETWORK:
  ENABLED: true
  REDIS_CHANNEL: "ultimate-donut-smp:orders"
  LOCK_PREFIX: "ultimate-donut-smp:orders:lock:"
  LOCK_TTL_SECONDS: 15

# UDS setup: Default sort options and order used by browsing menus.
SORTING:
  DEFAULT: MOST_PAID # Sets the default value used when none is selected.
  ALLOWED:
    - MOST_PAID
    - MOST_DELIVERED
    - RECENTLY_LISTED
    - MOST_MONEY_PER_ITEM

# UDS setup: Sign inputs configuration.
SEARCH_SIGN:
  lines:
    - ""
    - "↑↑↑↑↑↑↑↑↑↑↑↑↑↑"
    - "Search"
    - ""
  input-line: 0

AMOUNT_SIGN:
  lines:
    - ""
    - "↑↑↑↑↑↑↑↑↑↑↑↑↑↑"
    - "Amount"
    - ""
  input-line: 0

PRICE_SIGN:
  lines:
    - ""
    - "↑↑↑↑↑↑↑↑↑↑↑↑↑↑"
    - "Price"
    - ""
  input-line: 0

# UDS setup: Simulated bot settings for placing buy orders on the orders marketplace.
BOTS:
  ENABLED: false # Set to true to enable simulated bot buy orders on the orders marketplace.
  MIN_CHECK_INTERVAL_SECONDS: 60 # Minimum time in seconds between bot order attempts.
  MAX_CHECK_INTERVAL_SECONDS: 300 # Maximum time in seconds between bot order attempts.
  CHANCE: 0.5 # Probability (0.0 to 1.0) of a bot placing a buy order when checked. (e.g. 0.5 = 50% chance).
  MAX_ACTIVE_BOT_ORDERS: 10 # Maximum number of bot-created orders allowed to be active at once.
  MIN_DURATION_HOURS: 24 # Minimum order duration in hours for bot items.
  MAX_DURATION_HOURS: 72 # Maximum order duration in hours for bot items.
  BOT_NAMES:
    - "Builder_Bob"
    - "Farmer_John"
    - "Miner_Joe"
    - "Knight_Arthur"
    - "Collector_Rex"
  ITEMS:
    - MATERIAL: COBBLESTONE
      MIN_AMOUNT: 64
      MAX_AMOUNT: 576
      MIN_PRICE_EACH: 0.5
      MAX_PRICE_EACH: 1.5
    - MATERIAL: WHEAT
      MIN_AMOUNT: 32
      MAX_AMOUNT: 128
      MIN_PRICE_EACH: 2
      MAX_PRICE_EACH: 5
    - MATERIAL: DIAMOND
      MIN_AMOUNT: 1
      MAX_AMOUNT: 10
      MIN_PRICE_EACH: 100
      MAX_PRICE_EACH: 180
