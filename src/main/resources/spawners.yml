# UDS setup: Spawner stacking, anti-ESP behavior, GUI layout, and entity type settings.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Main enable flags, limits, timings, and behavior defaults for this feature.
SETTINGS:
  ENABLED: true # Enables or disables settings.
  ACCESS_MODE: OWNER_ONLY # Selects the mode or type used by this option.
  ALLOW_STEALING: false # If true, players can break and steal spawners placed by others.
  GENERATION_INTERVAL_SECONDS: 5 # Sets how often this task or update runs.
  PROCESS_ONLY_LOADED_CHUNKS: true # Configures the process only loaded chunks option.
  REQUIRE_PLAYER_NEARBY: false # Configures the require player nearby option.
  PLAYER_NEARBY_RADIUS: 16 # Sets the radius used for this check or effect.
  MAX_STACK_PER_BLOCK: 100000 # Sets the allowed limit for this option.
  STORAGE_CAP_PER_LOOT_KEY: 1000000 # Configures the storage cap per loot key option.
  DROP_ON_BREAK_IF_INVENTORY_FULL: true # Configures the drop on break if inventory full option.
  HOPPER_EXTRACTION:
    ENABLED: false # If true, hoppers placed underneath spawners will pull items out of spawner storage.
    AMOUNT_PER_CYCLE: 64 # The maximum amount of items per loot type to transfer to the hopper below per generation cycle.

# UDS setup: Spawner anti-ESP behavior and visibility protections.
ANTI_ESP:
  ENABLED: true # Enables or disables anti esp.
  REVEAL_RADIUS: 7 # Sets the radius used for this check or effect.
  OWNER_SEE_RADIUS: 9 # Sets the radius used for this check or effect.
  TRACKING_RADIUS: 128 # Sets the radius used for this check or effect.
  REQUIRE_LINE_OF_SIGHT: true # Configures the require line of sight option.
  STAFF_BYPASS_PERMISSION: "ultimatedonutsmp.admin.spawner.seeall" # Sets the permission node required for this action.
  CAMOUFLAGE:
    OVERWORLD: DEEPSLATE # Configures the overworld option.
    NETHER: NETHERRACK # Configures the nether option.
    THE_END: END_STONE # Configures the the end option.

# UDS setup: Menu title, rows, slots, buttons, and item layout for this feature.
GUI:
  STORAGE:
    TITLE: "&8{mob} ѕᴘᴀᴡɴᴇʀѕ - {page}/{max_page}" # Sets the title text shown for this menu or prompt.
    SIZE: 54 # Sets the inventory size in slots.
    ITEMS_PER_PAGE: 45 # Sets how many entries appear on each page.
  PANEL:
    TITLE: "&8ѕᴘᴀᴡɴᴇʀѕ - {world}" # Sets the title text shown for this menu or prompt.
    SIZE: 54 # Sets the inventory size in slots.
  WORLD_LIST:
    TITLE: "&8ѕᴘᴀᴡɴᴇʀѕ ᴘᴀɴᴇʟ" # Sets the title text shown for this menu or prompt.
    SIZE: 27 # Sets the inventory size in slots.

