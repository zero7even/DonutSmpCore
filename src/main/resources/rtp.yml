# Determines whether Enabled is enabled or disabled. Available options: true, false
ENABLED: true
# Configuration section for Settings.
SETTINGS:
  # The numerical value for Players In Rtp. Available options: Any valid integer
  PLAYERS-IN-RTP: 3
  # The numerical value for Max Attempts. Available options: Any valid integer
  MAX-ATTEMPTS: 16
MESSAGES:
  # The text or value for Disabled. Available options: Any valid string text
  DISABLED: '&cRTP is currently disabled.'
  # The text or value for Cooldown. Available options: Any valid string text
  COOLDOWN: '&cYou can''t rtp for another {remaining}s.'
  # The text or value for Max Players. Available options: Any valid string text
  MAX-PLAYERS: '&cToo many players are using RTP right now. Please try again later.'
  # The text or value for World Not Exist. Available options: Any valid string text
  WORLD-NOT-EXIST: '&cThe world does not exist.'
  # The text or value for Searching. Available options: Any valid string text
  SEARCHING: '&aSearching for a safe location in {world}...'
  # The text or value for Tp Warning. Available options: Any valid string text
  TP-WARNING: '&eDo not move for &b{countdown}&e seconds or the teleport will be canceled.'
  # The text or value for Search Actionbar. Available options: Any valid string text
  SEARCH-ACTIONBAR: '&7Searching {world}... &b{elapsed}s &8(&f{attempts}/{max_attempts}&8)'
  # The text or value for Search Found Actionbar. Available options: Any valid string text
  SEARCH-FOUND-ACTIONBAR: '&aSafe location found in {world}! &7Preparing teleport...'
  # The text or value for Safe Location Found. Available options: Any valid string text
  SAFE-LOCATION-FOUND: '&aSafe location found at: X:{x} Y:{y} Z:{z}'
  # The text or value for Max Attempts. Available options: Any valid string text
  MAX-ATTEMPTS: '&cCould not find a safe location after %attempts% attempts.'
  # The text or value for Destination Disabled. Available options: Any valid string text
  DESTINATION-DISABLED: '&cThis RTP destination is currently disabled.'
  # The text or value for Playtime Required. Available options: Any valid string text
  PLAYTIME-REQUIRED: '&cYou need at least {required} hours of playtime to RTP to {world}. &7(Current: {current}h)'
  # The text or value for Unsafe Location. Available options: Any valid string text
  UNSAFE-LOCATION: '&cThe location at X:{x} Y:{y} Z:{z} was rejected: {reason}'
  # The text or value for Safe Location Found Hidden. Available options: Any valid string text
  SAFE-LOCATION-FOUND-HIDDEN: '&aSafe location found! Teleporting you blindly...'
  # The text or value for Search Found Actionbar Hidden. Available options: Any valid string text
  SEARCH-FOUND-ACTIONBAR-HIDDEN: '&aFound safe location'
# Configuration section for Denied Worlds.
DENIED-WORLDS:
- afk
# Configuration section for World Settings.
WORLD-SETTINGS:
  # Configuration section for World.
  world:
    # The numerical value for Max Radius. Available options: Any valid integer
    MAX-RADIUS: 5000
    # The numerical value for Min Radius. Available options: Any valid integer
    MIN-RADIUS: 500
    # The numerical value for Center X. Available options: Any valid integer
    CENTER-X: 0
    # The numerical value for Center Z. Available options: Any valid integer
    CENTER-Z: 0
    # The numerical value for Cooldown. Available options: Any valid integer
    COOLDOWN: 30
  # Configuration section for World Nether.
  world_nether:
    # The numerical value for Max Radius. Available options: Any valid integer
    MAX-RADIUS: 500
    # The numerical value for Min Radius. Available options: Any valid integer
    MIN-RADIUS: 50
    # The numerical value for Center X. Available options: Any valid integer
    CENTER-X: 0
    # The numerical value for Center Z. Available options: Any valid integer
    CENTER-Z: 0
    # The numerical value for Cooldown. Available options: Any valid integer
    COOLDOWN: 30
    # The required playtime in hours to RTP to Nether. Set to 0 for no limit. Available options: Any decimal number
    REQUIRED-PLAYTIME-HOURS: 5.0
  # Configuration section for World The End.
  world_the_end:
    # The numerical value for Max Radius. Available options: Any valid integer
    MAX-RADIUS: 2000
    # The numerical value for Min Radius. Available options: Any valid integer
    MIN-RADIUS: 150
    # The numerical value for Center X. Available options: Any valid integer
    CENTER-X: 0
    # The numerical value for Center Z. Available options: Any valid integer
    CENTER-Z: 0
    # The numerical value for Cooldown. Available options: Any valid integer
    COOLDOWN: 30
    # The required playtime in hours to RTP to The End. Set to 0 for no limit. Available options: Any decimal number
    REQUIRED-PLAYTIME-HOURS: 10.0
# Configuration section for Rtp Menu.
RTP-MENU:
  TITLE: '&8RTP Menu'
  SIZE: 27
  # Determines whether Placeholder is enabled or disabled. Available options: true, false
  PLACEHOLDER: true
  # Configuration section for Buttons.
  BUTTONS:
    # Configuration section for Overworld.
    OVERWORLD:
      DISPLAY-NAME: '&#4B72FFOverworld'
      MATERIAL: GRASS_BLOCK
      SLOT: 11
      # The text or value for World. Available options: Any valid string text
      WORLD: world
      # Determines whether Enabled is enabled or disabled. Available options: true, false
      ENABLED: true
      LORE:
      - '&fClick to randomly teleport'
      - ''
      - '&7Players: &b{players}'
      - '&7Range: &b{min_radius}-{max_radius}'
      - '&7Cooldown: &b{cooldown}s'
    # Configuration section for Nether.
    NETHER:
      DISPLAY-NAME: '&#FF6B3DNether'
      MATERIAL: NETHERRACK
      SLOT: 13
      # The text or value for World. Available options: Any valid string text
      WORLD: world_nether
      # Determines whether Enabled is enabled or disabled. Available options: true, false
      ENABLED: true
      LORE:
      - '&fClick to randomly teleport'
      - ''
      - '&7Players: &b{players}'
      - '&7Range: &b{min_radius}-{max_radius}'
      - '&7Cooldown: &b{cooldown}s'
      - '&7Required Playtime: &b{required_playtime}'
    # Configuration section for The End.
    THE_END:
      DISPLAY-NAME: '&#F3E38AThe End'
      MATERIAL: END_STONE
      SLOT: 15
      # The text or value for World. Available options: Any valid string text
      WORLD: world_the_end
      # Determines whether Enabled is enabled or disabled. Available options: true, false
      ENABLED: true
      LORE:
      - '&fClick to randomly teleport'
      - ''
      - '&7Players: &b{players}'
      - '&7Range: &b{min_radius}-{max_radius}'
      - '&7Cooldown: &b{cooldown}s'
      - '&7Required Playtime: &b{required_playtime}'
# The numerical value for Default Title Fadeout. Available options: Any valid integer
DEFAULT-TITLE-FADEOUT: 10
