# UDS setup: Auction House listing rules, pricing limits, menus, and sorting defaults.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Main enable flags, limits, timings, and behavior defaults for this feature.
SETTINGS:
  ENABLED: true # Enables or disables settings.
  LISTING_DURATION_HOURS: 48 # Sets how long this behavior lasts.
  LISTING_DURATIONS_HOURS:
    - 6
    - 12
    - 24
    - 48
    - 72
    - 168
  MAX_ACTIVE_LISTINGS_DEFAULT: 5 # Sets the allowed limit for this option.
  # Exact permissions only. Wildcards such as ultimatedonutsmp.auctionhouse.* do not grant numeric limits.
  # Direct numeric nodes are also supported without listing them here:
  # - ultimatedonutsmp.auctionhouse.5
  # - ultimatedonutsmp.auctionhouse.limit.5
  MAX_ACTIVE_LISTINGS_BY_PERMISSION:
    ultimatedonutsmp.auctionhouse.limit.5: 5 # Configures the ultimatedonutsmp auctionhouse limit 5 option.
    ultimatedonutsmp.auctionhouse.limit.10: 10 # Configures the ultimatedonutsmp auctionhouse limit 10 option.
  CLICK_COOLDOWN_MS: 750 # Sets the cooldown before this action can run again.
  EXPIRE_CHECK_SECONDS: 30 # Sets the time value in seconds.

CLAIMS:
  # When disabled, pending payouts and returned items are collected automatically.
  # Items stay pending when the player's inventory is full.
  ENABLED: true

# UDS setup: Price floors, caps, fees, escrow limits, and refund behavior.
PRICING:
  MIN_PRICE: 100 # Sets the economy value used by this option.
  MAX_PRICE: 100000000 # Sets the economy value used by this option.
  LISTING_FEE: 0 # Configures the listing fee option.
  TAX_PERCENT: 5.0 # Configures the tax percent option.

# UDS setup: Materials, worlds, or item rules blocked from this feature.
RESTRICTIONS:
  BLOCKED_MATERIALS:
    - BEDROCK
    - BARRIER
    - COMMAND_BLOCK
    - CHAIN_COMMAND_BLOCK
    - REPEATING_COMMAND_BLOCK
    - STRUCTURE_BLOCK
    - STRUCTURE_VOID
    - JIGSAW
    - LIGHT
  BLOCKED_IF_HAS_LORE_CONTAINS: [] # Configures the blocked if has lore contains option.

