name: UltimateDonutSmp
version: '${project.version}'
main: com.bx.ultimateDonutSmp.UltimateDonutSmp
api-version: '${minecraft.api.version}'
folia-supported: true
softdepend:
  - NickPlus
  - PlaceholderAPI
  - LuckPerms
  - Vault
  - ProtocolLib
  - Apollo
  - SkinsRestorer
  - Multiverse-Core
  - floodgate

commands:
  team:
    description: team management
    usage: /team <create|disband|invite|kick|join|leave|home|sethome|delhome|chat|info|pvp>
  chat:
    description: manage global chat settings
    usage: /chat <help|mute|unmute|delay|clear>
  ignore:
    description: add or remove a player from your ignore list
    usage: /ignore <player|list>
    permission: ultimatedonutsmp.ignore
  unignore:
    description: remove a player from your ignore list
    usage: /unignore <player>
    permission: ultimatedonutsmp.ignore
  msg:
    description: send a private message
    usage: /msg <player> <message>
    aliases: [message, tell, whisper, w]
    permission: ultimatedonutsmp.message
  reply:
    description: reply to your last private conversation
    usage: /reply <message>
    aliases: [r]
    permission: ultimatedonutsmp.message
  pm:
    description: toggle private messages
    usage: /pm
    aliases: [togglepm, privatemessages]
    permission: ultimatedonutsmp.message.toggle
  friends:
    description: manage your friends, follows, and settings
    usage: /friends [list|follow|remove|search|following|followers|friends]
    aliases: [friend]
    permission: ultimatedonutsmp.friends
  home:
    description: teleport to your home
    usage: /home [name]
  homes:
    description: list your homes
    usage: /homes
  sethome:
    description: set your home
    usage: /sethome [name]
  delhome:
    description: delete a home
    usage: /delhome <name>
  renamehome:
    description: rename a home
    usage: /renamehome <old> <new>
  spawn:
    description: teleport to spawn
    usage: /spawn
  afk:
    description: go to AFK zone
    usage: /afk
  rtp:
    description: random teleport
    usage: /rtp [world]
  shop:
    description: open the shop
    usage: /shop [reload]
  shardshop:
    description: Open the shard currency shop directly
    usage: /shardshop
    permission: ultimatedonutsmp.shardshop
  orders:
    description: open the orders board
    usage: /orders [my|collect|reload|search query]
    aliases: [order]
  duel:
    description: challenge or manage duels
    usage: /duel [player|accept|deny|claims|reload]
  create:
    description: Create a private duel invite
    usage: /create <invite|friends> <player> [map]
  queue:
    description: open or join the duel queue
    usage: /queue [join|leave] [map]
  leave:
    description: leave a duel or FFA queue/match
    usage: /leave
  draw:
    description: request or accept a duel draw
    usage: /draw
  arena:
    description: manage duel arenas
    usage: /arena <create|delete|setpos1|setpos2|setreturn|setdisplay|enable|disable|queue|list|reload>
    aliases: [duelarena]
  ffa:
    description: join the instanced FFA queue
    usage: /ffa [join|reload|arena ...]
  ffastats:
    description: view FFA stats
    usage: /ffastats [player]
  ffaarena:
    description: manage FFA arenas
    usage: /ffaarena <create|delete|setpos|setdisplay|settings|enable|disable|list|reload>
  auctionhouse:
    description: open the auction house
    usage: /auctionhouse [sell|my|claims|cancel|limit|fastbuy|fastsell|reload]
    aliases: [ah]
  enderchest:
    description: open your custom ender chest
    usage: /enderchest [reload]
    aliases: [ec]
  ecsee:
    description: Inspect a player's custom Ender Chest
    usage: /ecsee <player>
  sell:
    description: open sell menu
    usage: /sell
  sellhand:
    description: sell item in hand
    usage: /sellhand [amount]
  sellall:
    description: sell all sellable items
    usage: /sellall
  sellhistory:
    description: view sell history
    usage: /sellhistory
  worth:
    description: open the worth browser or check held item worth
    usage: /worth [hand|reload]
    aliases: [prices]
  balance:
    description: check balance
    usage: /balance [player]
    aliases: [bal, money]
  pay:
    description: pay a player
    usage: /pay <player> <amount>
  addmoney:
    description: add money to a player
    usage: /addmoney <player> <amount>
    permission: ultimatedonutsmp.admin.addmoney
  removemoney:
    description: remove money from a player
    usage: /removemoney <player> <amount>
    permission: ultimatedonutsmp.admin.removemoney
  setmoney:
    description: set a player's money balance
    usage: /setmoney <player> <amount>
    permission: ultimatedonutsmp.admin.setmoney
  shards:
    description: check shards
    usage: /shards [player] | /shards everywhere <status|debug> [player]
  shardpay:
    description: pay shards to a player
    usage: /shardpay <player> <amount>
  addshards:
    description: add shards to a player
    usage: /addshards <player> <amount>
    permission: ultimatedonutsmp.admin.shards
  removeshards:
    description: remove shards from a player
    usage: /removeshards <player> <amount>
    permission: ultimatedonutsmp.admin.shards
  setshards:
    description: set a player's shard balance
    usage: /setshards <player> <amount>
    permission: ultimatedonutsmp.admin.shards
  crate:
    description: manage crates
    usage: /crate <create|delete|type|open|keys|reload|key|take|set|keyall|add|edit|remove|bind|unbind|info>
  crates:
    description: open the crates menu
    usage: /crates
  keys:
    description: open your crate keys menu
    usage: /keys
  stats:
    description: view player stats
    usage: /stats [player]
  ping:
    description: check your ping or another online player's ping
    usage: /ping [player]
  playtime:
    description: check your playtime or another player's playtime
    usage: /playtime [player]
    aliases: [pt]
  freeze:
    description: freeze or unfreeze a player for moderation
    usage: /freeze <player> | /freeze reload
  fly:
    description: toggle flight mode for yourself or another player
    usage: /fly [player]
  heal:
    description: restore health for yourself or another player
    usage: /heal [player]
  feed:
    description: restore hunger for yourself or another player
    usage: /feed [player]
  god:
    description: toggle god mode for yourself or another online player
    usage: /god [player]
    aliases: [godmode]
  gamemode:
    description: change your gamemode or another online player's gamemode
    usage: /gamemode <mode> [player]
    aliases: [gm, gmc, gms, gma, gmsp]
  staffmode:
    description: toggle the staff moderation hotbar
    usage: /staffmode [player|reload]
    aliases: [staff]
  stafflist:
    description: open the online staff list
    usage: /stafflist
  staffchat:
    description: send a message to staff chat
    usage: /staffchat <message>
    aliases: [sc]
  helpop:
    description: request staff assistance
    usage: /helpop <message>
    permission: ultimatedonutsmp.helpop
  report:
    description: report a player to online staff
    usage: /report <player> <reason>
    permission: ultimatedonutsmp.report
  rename:
    description: rename the item in your hand
    usage: /rename <name...|reset>
  safety:
    description: safety info
    usage: /safety [reload|add [player]]
  amod:
    description: Anvil Moderation admin command
    usage: /amod <add|reload>
    permission: anvilmod.admin
  randomteleport:
    description: teleport to a random online player
    usage: /randomteleport
    aliases: [randomtp]
  teleport:
    description: staff teleport command suite
    usage: /teleport <player|here <player>|all|top|x y z [world]>
    aliases: [tp, tphere, tpall]
  alts:
    description: view alternate accounts by shared ip history
    usage: /alts <player>
  vanish:
    description: toggle vanish while in staff mode
    usage: /vanish
  invsee:
    description: view another player's inventory
    usage: /invsee <player> | /invsee reload
    aliases: [inventorysee]
  profileviewer:
    description: view a player's profile and homes
    usage: /profileviewer <player>
    aliases: [pv]
  punishments:
    description: view a player's punishment history
    usage: /punishments <player>
    aliases: [phistory]
  ban:
    description: ban a player and record punishment history
    usage: /ban <player> [reason]
    permission: ultimatedonutsmp.staff.punishments.ban
  tempban:
    description: temporarily ban a player and record punishment history
    usage: "/tempban <player> <time> [reason] (time: 30s, 15m, 2h, 5d, or 5d 15m 30s)"
    permission: ultimatedonutsmp.staff.punishments.ban
  mute:
    description: mute a player and record punishment history
    usage: /mute <player> [reason]
    permission: ultimatedonutsmp.staff.punishments.mute
  tempmute:
    description: temporarily mute a player and record punishment history
    usage: "/tempmute <player> <time> [reason] (time: 30s, 15m, 2h, 5d, or 5d 15m 30s)"
    permission: ultimatedonutsmp.staff.punishments.mute
  warn:
    description: warn a player and record punishment history
    usage: /warn <player> [reason]
    permission: ultimatedonutsmp.staff.punishments.create
  kick:
    description: kick a player and record punishment history
    usage: /kick <player> [reason]
    permission: ultimatedonutsmp.staff.punishments.create
  blacklist:
    description: blacklist a player and record punishment history
    usage: /blacklist <player> [reason]
    permission: ultimatedonutsmp.staff.punishments.blacklist
  unban:
    description: remove active ban records for a player
    usage: /unban <player> [reason]
    aliases: [pardon]
    permission: ultimatedonutsmp.staff.punishments.unban
  unmute:
    description: remove active mute records for a player
    usage: /unmute <player> [reason]
    permission: ultimatedonutsmp.staff.punishments.unmute
  unblacklist:
    description: remove active blacklist records for a player
    usage: /unblacklist <player> [reason]
    permission: ultimatedonutsmp.staff.punishments.unblacklist
  bounty:
    description: manage bounties
    usage: /bounty <add|set|info|list> [player] [amount]
  tpa:
    description: request teleport to player
    usage: /tpa <player>
  tpahere:
    description: request player to teleport to you
    usage: /tpahere <player>
  tpaccept:
    description: accept a tpa request
    usage: /tpaccept [player]
  tpadeny:
    description: deny a tpa request
    usage: /tpadeny [player]
  tpacancel:
    description: cancel your tpa requests
    usage: /tpacancel
  tpauto:
    description: toggle tpa auto-accept
    usage: /tpauto
  tpahereauto:
    description: toggle tpa here auto-accept
    usage: /tpahereauto
  leaderboard:
    description: view leaderboards
    usage: /leaderboard [type]
    aliases: [lb, top, leaderboards, baltop]
  warp:
    description: teleport to a warp
    usage: /warp [name]
  warpmanager:
    description: manage warp points
    usage: /warpmanager <create|delete|list> [name]
  portalmanager:
    description: manage rtp portal triggers
    usage: /portalmanager <list|info|create|delete|setcuboid|setdestination|setdisplay|toggle|setpriority|sethologramhere>
  nightvision:
    description: toggle night vision
    usage: /nightvision
    aliases: [nv]
  phantom:
    description: toggle phantom spawning
    usage: /phantom
  findplayer:
    description: find a player location
    usage: /findplayer <player>
    aliases: [fp]
  settings:
    description: open player settings
    usage: /settings
  discord:
    description: get discord link
    usage: /discord
  twitter:
    description: get twitter/x link
    usage: /twitter
  store:
    description: get store link
    usage: /store
  social:
    description: get social links
    usage: /social
    aliases: [media]
  rules:
    description: view server rules
    usage: /rules
  help:
    description: view help
    usage: /help
  servers:
    description: view network server status
    usage: /servers
    permission: ultimatedonutsmp.servers
  billford:
    description: open billford trade
    usage: /billford
  spawner:
    description: manage donut-style spawners
    usage: /spawner [give|info|panel|reload|remove]
    aliases: [spawners]
  spawnstash:
    description: Spawn temporary staff bait stashes
    usage: /spawnstash [type|spawn|list|remove|reload]
    aliases: [stash]
    permission: ultimatedonutsmp.staff.spawnstash
  fakeplayer:
    description: Spawn a temporary fake player bait NPC
    usage: /fakeplayer
    aliases: [fplayer]
    permission: ultimatedonutsmp.staff.fakeplayer
  hide:
    description: Scramble, inspect, or remove hidden player identities
    usage: /hide [status|scramble|remove|check <player>|list]
  disguise:
    description: Disguise using a configured skin, Minecraft username, or skin URL
    usage: /disguise [player-name|url] or /disguise <alias> <player-name|url>
  clearlag:
    description: manually clear lag entities
    usage: /clearlag
    permission: ultimatedonutsmp.admin.clearlag
  cuboid:
    description: manage cuboid regions
    usage: /cuboid <wand|create|delete|list|bind <cuboid> <spawn|shard|rtp-zone> <true|false>|reload>
    permission: ultimatedonutsmp.admin.cuboid
  setwarp:
    description: set a warp point
    usage: /setwarp <name>
  delwarp:
    description: delete a warp point
    usage: /delwarp <name>
  amethysttool:
    description: manage amethyst tools
    usage: /amethysttool give <player> <type> [duration] | /amethysttool reload
    permission: ultimatedonutsmp.admin.amethysttool
  ultimatedonutsmp:
    description: ultimatedonutsmp admin command
    usage: /ultimatedonutsmp <reload|statswipe|optimize>
    aliases: [uds, udsmp]
  serverwipe:
    description: Preview and execute a guarded season reset
    usage: /serverwipe <preview|prepare|confirm|cancel|status>
    permission: ultimatedonutsmp.admin.serverwipe
  maintenance:
    description: toggle maintenance mode
    usage: /maintenance <on|off|status|setlobby [server]>
    permission: ultimatedonutsmp.admin.maintenance
  kill:
    description: show a confirmation gui to kill yourself
    usage: /kill
    aliases: [suicide]

