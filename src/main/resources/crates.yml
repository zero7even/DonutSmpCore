# UDS setup: Crate opening behavior and editable crate reward definitions.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Main enable flags, limits, timings, and behavior defaults for this feature.
SETTINGS:
  LIST-MENU:
    TITLE: "&8ᴄʀᴀᴛᴇѕ" # Sets the title text shown for this menu or prompt.
    SIZE: 27 # Sets the inventory size in slots.
    FILLER: "GRAY_STAINED_GLASS_PANE" # Configures the filler option.
    CONTENT-SLOTS: [10, 11, 12, 13, 14, 15, 16] # Configures the content slots option.
    EMPTY-SLOT: 13 # Sets the inventory slot used by this item.
    EMPTY:
      MATERIAL: "BARRIER" # Sets the Bukkit material used here.
      DISPLAY-NAME: "&cɴᴏ ᴄʀᴀᴛᴇѕ" # Sets the display name shown to players.
      LORE:
        - "&7ɴᴏ ᴄʀᴀᴛᴇѕ ᴀʀᴇ ᴀᴠᴀɪʟᴀʙʟᴇ ʀɪɢʜᴛ ɴᴏᴡ."
    CLOSE-BUTTON:
      SLOT: 26 # Sets the inventory slot used by this item.
      MATERIAL: "BARRIER" # Sets the Bukkit material used here.
      DISPLAY-NAME: "&cᴄʟᴏѕᴇ" # Sets the display name shown to players.
      LORE:
        - "&7ᴄʟᴏѕᴇ ᴛʜɪѕ ᴍᴇɴᴜ."

  CONFIRM-MENU:
    SIZE: 27 # Sets the inventory size in slots.
    FILLER: "GRAY_STAINED_GLASS_PANE" # Configures the filler option.
    PREVIEW-SLOT: 13 # Sets the inventory slot used by this item.
    CONFIRM-SLOT: 15 # Sets the inventory slot used by this item.
    CONFIRM-BUTTON:
      MATERIAL: "LIME_STAINED_GLASS_PANE" # Sets the Bukkit material used here.
      DISPLAY-NAME: "&aᴄᴏɴꜰɪʀᴍ" # Sets the display name shown to players.
      LORE:
        - "&7ᴄʟᴀɪᴍ &f{reward}&7 ꜰʀᴏᴍ"
        - "&b{crate}&7."
    CANCEL-BUTTON:
      SLOT: 11 # Sets the inventory slot used by this item.
      MATERIAL: "RED_STAINED_GLASS_PANE" # Sets the Bukkit material used here.
      DISPLAY-NAME: "&cᴄᴀɴᴄᴇʟ" # Sets the display name shown to players.
      LORE:
        - "&7ʀᴇᴛᴜʀɴ ᴛᴏ ᴛʜᴇ ʀᴇᴡᴀʀᴅ ʟɪѕᴛ."

  HOLOGRAM:
    OFFSET-Y: 1.6 # Configures the offset y option.
    VIEW-DISTANCE: 24.0 # Configures the view distance option.
    UPDATE-TICKS: 20 # Sets how often this task or update runs.
    LINES:
      - "{crate}"
      - "&7right-click to open"
    KEY-LINE: "&7keys: &f{keys}" # Configures the key line option.

  PREVIEW:
    ENABLED: true # Enables or disables the floating items preview.
    OFFSET-Y: 1.25 # The vertical offset above the crate block for the preview item.
    UPDATE-INTERVAL-TICKS: 2 # How often to update the rotation/hover on the server (1 = every tick, 2 = every 2 ticks, etc). Higher values reduce server lag.
    CYCLE-INTERVAL-TICKS: 40 # Cycle to the next reward item every 2 seconds.
    ROTATION-SPEED: 4.0 # Rotation speed factor in degrees per tick.
    HOVER-AMPLITUDE: 0.08 # Maximum vertical distance to float up and down.
    HOVER-SPEED: 0.08 # Speed/frequency of the floating motion.

  PARTICLES:
    ENABLED: true # Enables or disables particles.
    TYPE: "ENCHANT" # Selects the mode or type used by this option.
    COUNT: 4 # Configures the count option.

  GACHA:
    TITLE: "&8rolling reward" # Sets the title text shown for this menu or prompt.
    FILLER: "BLACK_STAINED_GLASS_PANE" # Configures the filler option.
    PREVIEW-SLOTS: [10, 11, 12, 13, 14, 15, 16] # Configures the preview slots option.
    POINTER-SLOT: 13 # Sets the inventory slot used by this item.
    TOTAL-STEPS: 38 # Configures the total steps option.
    TICK-INTERVAL: 2 # Sets how often this task or update runs.

# UDS setup: Crate definitions, keys, animations, rewards, and editor-managed content.
CRATES:
  common:
    ENABLED: true # Enables or disables common.
    OPEN-TYPE: "CHOOSE_ONE" # Selects the mode or type used by this option.
    DISPLAY:
      MATERIAL: "CHEST" # Sets the Bukkit material used here.
      DISPLAY-NAME: "&fcommon crate" # Sets the display name shown to players.
      LORE:
        - "&7keys: &f{keys}"
        - "&aclick to open and choose 1 reward."
    KEY-ITEM:
      MATERIAL: "TRIPWIRE_HOOK" # Sets the Bukkit material used here.
      DISPLAY-NAME: "&fcommon key" # Sets the display name shown to players.
      LORE:
        - "&7opens the &fcommon crate&7."
