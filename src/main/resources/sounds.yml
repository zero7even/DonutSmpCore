  REWARD-BOOSTED: "minecraft:entity.player.levelup|0.85|1.45" # Sets the sound played for this event.
  CANCELLED: "minecraft:entity.villager.no|0.8|1.1" # Sets the sound played for this event.

# UDS setup: Command registration, descriptions, usage, and aliases.
COMMANDS:
