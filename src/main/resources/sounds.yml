# UDS setup: Sound effects played by commands, menus, and feature actions.
# UDS setup: Keep indentation with spaces; reload with /uds reload when the setting supports reload.

# UDS setup: Sounds used by menu actions.
MENUS:
  BUTTON-CLICK: "minecraft:ui.button.click|1.0|1.0" # Sets the sound played for this event.
  PAGE-TURN: "minecraft:item.book.page_turn|2.0|0.1" # Sets the sound played for this event.

# UDS setup: Spawn command and spawn menu sounds.
SPAWN:
  SLIME-JUMP: "minecraft:entity.slime.jump|1.0|1.0" # Sets the sound played for this event.

# UDS setup: Sell command and sell menu sounds.
SELL:
  LEVEL-UP: "minecraft:entity.player.levelup|1.0|2.0" # Sets the sound played for this event.
  SUCCESS: "minecraft:entity.experience_orb.pickup|1.0|1.0" # Sets the sound played for this event.

# UDS setup: Amethyst tool sounds.
AMETHYST:
  EXPIRED: "minecraft:entity.item.break|1.0|1.0" # Sets the sound played for this event.
  BREAK: "minecraft:block.amethyst_block.break|1.0|1.0" # Sets the sound played for this event.

# UDS setup: Booster activation and feedback sounds.
BOOSTER:
  ERROR: "minecraft:entity.villager.no|1.0|1.0" # Sets the sound played for this event.
  SUCCESS: "minecraft:entity.player.levelup|1.0|1.0" # Sets the sound played for this event.

# UDS setup: Shard earning, boosters, menus, drops, cuboids, and passive generation.
SHARDS:
