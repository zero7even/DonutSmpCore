name: Build Jar

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Build Root Project (Paper)
        if: ${{ hashFiles('pom.xml') != '' }}
        run: pwsh scripts/build-compat.ps1 -Target Paper

      - name: Build Root Project (Folia)
        if: ${{ hashFiles('pom.xml') != '' }}
        run: pwsh scripts/build-compat.ps1 -Target Folia

      - name: Build Subdirectory Project (Paper)
        if: ${{ hashFiles('github/pom.xml') != '' }}
        run: |
          cd github
          pwsh scripts/build-compat.ps1 -Target Paper

      - name: Build Subdirectory Project (Folia)
        if: ${{ hashFiles('github/pom.xml') != '' }}
        run: |
          cd github
          pwsh scripts/build-compat.ps1 -Target Folia

      - name: Determine Artifact Names
        id: get_names
        run: |
          # Find finalized paper jar in dist or github/dist
          PAPER_PATH=$(find . -path "*/dist/*paper-spigot*.jar" | head -n 1)
          if [ -n "$PAPER_PATH" ]; then
            PAPER_NAME=$(basename "$PAPER_PATH" .jar)
          else
            PAPER_NAME="UltimateDonutSMP-Paper"
          fi
          echo "paper_name=$PAPER_NAME" >> $GITHUB_OUTPUT

          # Find finalized folia jar in dist or github/dist
          FOLIA_PATH=$(find . -path "*/dist/*folia*.jar" | head -n 1)
          if [ -n "$FOLIA_PATH" ]; then
            FOLIA_NAME=$(basename "$FOLIA_PATH" .jar)
          else
            FOLIA_NAME="UltimateDonutSMP-Folia"
          fi
          echo "folia_name=$FOLIA_NAME" >> $GITHUB_OUTPUT

      - name: Upload Paper Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.get_names.outputs.paper_name }}
          path: |
            dist/*paper-spigot*.jar
            github/dist/*paper-spigot*.jar
          if-no-files-found: error

      - name: Upload Folia Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.get_names.outputs.folia_name }}
          path: |
            dist/*folia*.jar
            github/dist/*folia*.jar
          if-no-files-found: error
