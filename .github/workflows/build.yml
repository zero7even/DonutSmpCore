name: Build Jar

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Build Root Project (Paper)
        if: ${{ hashFiles('pom.xml') != '' }}
        run: pwsh scripts/build-compat.ps1 -Target Paper

      - name: Build Root Project (Folia)
        if: ${{ hashFiles('pom.xml') != '' }}
        run: pwsh scripts/build-compat.ps1 -Target Folia

      - name: Build Subdirectory Project (Paper)
        if: ${{ hashFiles('github/pom.xml') != '' }}
        run: |
          cd github
          pwsh scripts/build-compat.ps1 -Target Paper

      - name: Build Subdirectory Project (Folia)
        if: ${{ hashFiles('github/pom.xml') != '' }}
        run: |
          cd github
          pwsh scripts/build-compat.ps1 -Target Folia

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UltimateDonutSMP-Jars
          path: |
            dist/*.jar
            github/dist/*.jar
          if-no-files-found: error
