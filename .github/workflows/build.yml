name: Build Jar

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Build Project
        run: mvn clean package

      - name: Upload Shaded Jar
        uses: actions/upload-artifact@v4
        with:
          name: UltimateDonutSMP
          path: target/UltimateDonutSmp-*.jar
          if-no-files-found: error
